<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agricultural & Rural Development – Interactive Data Visualisation with choropleth map and PCA scatterplot.">
    <title>Agricultural & Rural Development</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/style.css') }}">

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.0/topojson.min.js"></script>
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <div class="header-title">
                <h1>Agricultural &amp; Rural Development</h1>
            </div>
            <div class="header-meta">
                <span id="country-count" class="stat-pill">49 countries</span>
                <span id="year-range-pill" class="stat-pill">1960 – 2020</span>
            </div>
        </div>
    </header>

    <section class="controls-bar">
        <div class="control-group">
            <label for="indicator-select" class="control-label">Indicator</label>
            <select id="indicator-select" class="control-select"></select>
        </div>
        <div class="control-group slider-group">
            <label for="year-slider" class="control-label">Year</label>
            <input type="range" id="year-slider" class="year-slider" />
            <span id="year-slider-value" class="slider-value">2020</span>
        </div>
        <div class="selected-info" id="selected-info">
            <span class="selected-label">Click a country to explore</span>
        </div>
    </section>

    <main class="viz-grid">

        <section class="viz-card map-card" id="map-section">
            <div class="card-header">
                <h2 class="card-title">World Choropleth</h2>
                <p class="card-subtitle" id="map-subtitle">Select an indicator to colour the map</p>
                <div class="country-search-wrapper">
                    <input type="text" id="country-search" list="country-datalist" placeholder="Search country..." autocomplete="off">
                    <datalist id="country-datalist"></datalist>
                </div>
            </div>
            <div class="map-wrapper">
                <svg id="svg_map"></svg>
            </div>
            <div class="legend-wrapper" id="map-legend"></div>
        </section>

        <section class="viz-card scatter-card" id="scatter-section">
            <div class="card-header">
                <h2 class="card-title">PCA Scatterplot</h2>
                <p class="card-subtitle" id="scatter-subtitle">
                    PCA on year <span id="pca-year">{{ pca_year }}</span>
                    — PC1: <span id="ev1"></span>% &nbsp;|&nbsp; PC2: <span id="ev2"></span>%
                </p>
                <button id="clear-brush-btn" class="clear-brush-btn" title="Clear brush selection">✕ Clear Brush</button>
            </div>
            <div class="scatter-wrapper">
                <svg id="svg_plot"></svg>
                <div id="scatter-tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>
            </div>
        </section>

    </main>

    <section class="viz-card line-card" id="line-section">
        <div class="card-header">
            <h2 class="card-title">Time Series</h2>
            <p class="card-subtitle" id="line-subtitle">Select a country on the map or brush in the scatterplot</p>
        </div>
        <div id="svg_line_plot" class="line-wrapper"></div>
    </section>

    <script>
        var allData      = {{ data | safe }};
        var pcaData      = {{ pca_data | safe }};
        var explainedVar = {{ explained_var | safe }};
        var pcaYear      = {{ pca_year }};
        var indicators   = {{ indicators | safe }};
        var countries    = {{ countries | safe }};
    </script>

    <div id="map-tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

    <div id="js-error-box" style="display:none;position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:12px 16px;font-family:monospace;font-size:13px;z-index:9999;"></div>
    <script>
        window.addEventListener('error', function(e) {
            var box = document.getElementById('js-error-box');
            box.style.display = 'block';
            box.textContent = 'JS ERROR: ' + e.message + ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')';
        });
    </script>

    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    <script src="{{ url_for('static', filename='js/scatter.js') }}"></script>
    <script src="{{ url_for('static', filename='js/linechart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
